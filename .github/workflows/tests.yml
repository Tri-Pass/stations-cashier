name: Tests

on:
  pull_request:
    branches: [main]

# Cancel the previous in-progress run for the same PR when a new
# commit is pushed — only the latest run matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: Flutter Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.5'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Generate HTML coverage report
        run: genhtml coverage/lcov.info --output-directory coverage/html --title "stations-cashier"

      - name: Coverage summary → job summary
        run: |
          echo "## 🧪 Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          lcov --summary coverage/lcov.info 2>&1 | grep -v "^Reading" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Enforce coverage threshold (≥ 80 %)
        run: |
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep -oP '\d+\.\d+(?=%)' | head -1)
          echo "Line coverage: ${COVERAGE}%"
          if awk "BEGIN { exit !($COVERAGE < 80) }"; then
            echo "❌ Coverage ${COVERAGE}% is below the 80% minimum threshold"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% passes the 80% threshold"

      - name: Upload lcov data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/html
